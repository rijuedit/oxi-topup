<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OXI TOP UP</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1>OXI <span>TOP UP</span></h1>
                <p>Free Fire Diamond Top-Up</p>
            </div>

            <h2>👋 Welcome!</h2>

            <button id="googleLoginBtn" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Sign in with Google
            </button>

            <div id="loadingDiv" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Login হচ্ছে...</p>
            </div>

            <div id="errorMsg" class="error-msg" style="display: none;"></div>

            <div class="divider">
                <span>Secure Login</span>
            </div>

            <p class="login-footer">
                Login করে আপনি আমাদের Terms & Conditions মেনে নিচ্ছেন
            </p>
        </div>
    </div>

    <script type="module">
        import { auth, database, googleProvider, signInWithPopup, ref, set, get, onAuthStateChanged } from './config.js';

        const googleBtn = document.getElementById('googleLoginBtn');
        const loadingDiv = document.getElementById('loadingDiv');
        const errorMsg = document.getElementById('errorMsg');

        // Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        googleBtn.addEventListener('click', async () => {
            try {
                googleBtn.disabled = true;
                loadingDiv.style.display = 'block';
                errorMsg.style.display = 'none';

                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                // Save user to database
                const userRef = ref(database, 'users/' + user.uid);
                const snapshot = await get(userRef);

                if (!snapshot.exists()) {
                    await set(userRef, {
                        name: user.displayName,
                        email: user.email,
                        photo: user.photoURL,
                        wallet: 0,
                        createdAt: new Date().toISOString()
                    });
                }

                window.location.href = 'index.html';
            } catch (error) {
                console.error('Login Error:', error);
                loadingDiv.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.textContent = '❌ Login ব্যর্থ: ' + error.message;
                googleBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
