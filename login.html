<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OXI TOP UP</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <h1>OXI <span>TOP UP</span></h1>
                <p>Free Fire Diamond Top-Up</p>
            </div>

            <div class="login-content">
                <h2>👋 Welcome!</h2>
                <p class="login-subtitle">Login করে ডায়মন্ড কিনুন সহজেই</p>

                <button id="googleLoginBtn" class="btn-google-login">
                    <svg width="20" height="20" viewBox="0 0 48 48">
                        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                    </svg>
                    Sign in with Google
                </button>

                <p class="login-terms">
                    Login করে আপনি আমাদের <br>
                    <a href="#">Terms & Conditions</a> মেনে নিচ্ছেন
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, database, googleProvider, signInWithPopup, ref, set, get, onAuthStateChanged } from './config.js';

        // Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                // Save user to database
                const userRef = ref(database, 'users/' + user.uid);
                const snapshot = await get(userRef);

                if (!snapshot.exists()) {
                    await set(userRef, {
                        name: user.displayName,
                        email: user.email,
                        photo: user.photoURL,
                        wallet: 0,
                        createdAt: new Date().toISOString()
                    });
                }

                alert('✅ Login সফল হয়েছে!');
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Login Error:', error);
                alert('❌ Login ব্যর্থ: ' + error.message);
            }
        });
    </script>

</body>
</html>
